<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicidad</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
  #player, #player iframe { position:fixed; top:0; left:0; width:100vw !important; height:100vh !important; }
</style>
</head>
<body>
<div id="player"></div>

<script>
  // ====================== CONFIGURA AQUÍ ======================
  var PLAYLIST_ID = "PL94JLw2bEwrftVzjBhEJa5YFE0c9maEMw&si=eg4j0cy9cYGFSu1_"; // ej: PL1A2B3C4D5E6F7G8H
  var MUTED = true; // true = sin audio (recomendado, evita que el navegador bloquee el autoplay)
  // ==============================================================

  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

  var player;
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      playerVars: {
        listType: 'playlist',
        list: PLAYLIST_ID,
        autoplay: 1,
        mute: MUTED ? 1 : 0,
        loop: 1,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0,
        playsinline: 1,
        iv_load_policy: 3
      },
      events: {
        'onReady': function(e){ e.target.playVideo(); },
        'onStateChange': function(e){ if (e.data === YT.PlayerState.ENDED) { player.nextVideo(); } },
        'onError': function(e){ player.nextVideo(); } // si un video falla, salta al siguiente
      }
    });
  }

  // Recarga preventiva cada 6 horas (limpia memoria, reconecta si hubo cortes de red)
  setTimeout(function() { location.reload(); }, 6 * 60 * 60 * 1000);
</script>
</body>
</html>
